services:
  agent-os:
    image: agent-os:latest
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:1777:3003"
      # Optional: host-only access for npm run migrate:nutrition from the VPS shell
      - "127.0.0.1:27017:27017"
    volumes:
      # Vault read + Inbox/ writes (external git-sync system pushes /root/PARA)
      - /root/PARA:/root/PARA
      # Audit log + embedded MongoDB data
      - agent-os-data:/var/lib/agent-os
    environment:
      - NODE_ENV=production
      - VAULT_PATH=/root/PARA
      - AGENT_OS_DATA_PATH=/var/lib/agent-os
      - MONGO_DBPATH=/var/lib/agent-os/mongodb
      - TZ=Asia/Jakarta
      # Embedded MongoDB (127.0.0.1 inside container); set EMBEDDED_MONGO=false + external URI to opt out
      - MONGODB_URI=${MONGODB_URI:-mongodb://127.0.0.1:27017/nutrition-tracker}
      - EMBEDDED_MONGO=${EMBEDDED_MONGO:-auto}
      # Required for /assistant (Cursor SDK)
      - CURSOR_API_KEY=${CURSOR_API_KEY}
      - CURSOR_ASSISTANT_MODEL=${CURSOR_ASSISTANT_MODEL:-composer-2.5}
      # Host used to build the Google OAuth redirect when calendar tools run via
      # the assistant/MCP (no HTTP request); ignored if GOOGLE_OAUTH_REDIRECT_URI is set.
      - ASSISTANT_OAUTH_HOST=${ASSISTANT_OAUTH_HOST:-personal.lumen-dev.com}
      # WAHA webhook → /api/webhooks/whatsapp
      - WAHA_WEBHOOK_SECRET=${WAHA_WEBHOOK_SECRET}
      - WAHA_BASE_URL=${WAHA_BASE_URL:-https://waha.lumen-dev.com}
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WAHA_SESSION=${WAHA_SESSION:-default}
      - WHATSAPP_ALLOWED_JIDS=${WHATSAPP_ALLOWED_JIDS}
      - WHATSAPP_ACK_MESSAGE=${WHATSAPP_ACK_MESSAGE:-Saved to Inbox}
      # Chat to receive todo-due WhatsApp notifications; defaults to the first WHATSAPP_ALLOWED_JIDS entry
      - WHATSAPP_NOTIFY_JID=${WHATSAPP_NOTIFY_JID:-}
      # Google Calendar (read-only OAuth)
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI:-}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY}
      - OAUTH_STATE_SECRET=${OAUTH_STATE_SECRET}
      # Site password gate (active when DEV_PREVIEW_PASSWORD is set)
      - DEV_PREVIEW_PASSWORD=${DEV_PREVIEW_PASSWORD:-}
      - DEV_PREVIEW_SECRET=${DEV_PREVIEW_SECRET:-}
      - DEV_PREVIEW_COOKIE_MAX_AGE=${DEV_PREVIEW_COOKIE_MAX_AGE:-604800}
    networks:
      - dokploy-network
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "mongodb://127.0.0.1:27017/nutrition-tracker",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    labels:
      traefik.enable: "true"
      traefik.docker.network: dokploy-network
      traefik.http.routers.agent-os-web.rule: Host(`personal.lumen-dev.com`)
      traefik.http.routers.agent-os-web.entrypoints: web
      traefik.http.routers.agent-os-web.middlewares: redirect-to-https@file
      traefik.http.routers.agent-os-websecure.rule: Host(`personal.lumen-dev.com`)
      traefik.http.routers.agent-os-websecure.entrypoints: websecure
      traefik.http.routers.agent-os-websecure.tls.certresolver: letsencrypt
      traefik.http.services.agent-os.loadbalancer.server.port: "3003"

volumes:
  agent-os-data:

networks:
  dokploy-network:
    external: true
