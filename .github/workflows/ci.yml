name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint
        env:
          VAULT_PATH: /tmp/vault
          MONGODB_URI: mongodb://localhost:27017/test
          AGENT_OS_DATA_PATH: /tmp/agent-os-data

  # Lighthouse perf budget — warn-only for now (see docs/perf-budget.md).
  # Non-blocking: assertions are "warn" and the job is continue-on-error until
  # the budget is ratified with real numbers, then flip to enforce.
  lighthouse:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (production)
        run: pnpm --filter agent-os build
        env:
          # Lock disabled (no DEV_PREVIEW_PASSWORD) so routes are reachable;
          # integrations unconfigured → cards render their empty/skeleton states.
          VAULT_PATH: /tmp/vault
          MONGODB_URI: mongodb://localhost:27017/test
          AGENT_OS_DATA_PATH: /tmp/agent-os-data

      - name: Lighthouse CI
        working-directory: apps/web
        run: |
          mkdir -p /tmp/vault
          npx --yes @lhci/cli@0.16.x autorun
        env:
          VAULT_PATH: /tmp/vault
          MONGODB_URI: mongodb://localhost:27017/test
          AGENT_OS_DATA_PATH: /tmp/agent-os-data
